<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("peso-admin-theme");
          var theme =
            stored === "dark" || stored === "light"
              ? stored
              : window.matchMedia &&
                  window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          if (localStorage.getItem("peso-sidebar-collapsed") === "1")
            document.documentElement.setAttribute(
              "data-sidebar-collapsed",
              "1",
            );
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          if (
            localStorage.getItem("peso-admin-role") === "staff" &&
            localStorage.getItem("peso-admin-approved") === "1"
          ) {
            document.documentElement.setAttribute(
              "data-hide-staff-accounts",
              "1",
            );
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <title>Staff Accounts | PESO</title>
    <link rel="icon" type="image/png" href="/src/images/peso_seal.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/sidebar.css" />
    <link rel="stylesheet" href="/css/staff_accounts/staff-accounts.css" />
    <link rel="stylesheet" href="/css/responsive-tables.css" />
  </head>
  <body>
    <script type="module" src="/js/authentication/auth-guard.js"></script>
    <script
      type="module"
      src="/js/authentication/staff-accounts-guard.js"
    ></script>
    <script>
      document.documentElement.classList.add("auth-pending");
    </script>
    <script>
      try {
        if (localStorage.getItem("peso-sidebar-collapsed") === "1")
          document.body.classList.add("sidebar-collapsed");
      } catch (e) {}
    </script>
    <div class="container-fluid">
      <div class="row layout-row">
        <div class="sidebar-overlay" aria-hidden="true"></div>
        <div class="sidebar-wrapper">
          <div class="sidebar p-0">
            <div class="logo d-flex align-items-center py-3 px-2">
              <img
                src="/src/images/peso_seal.png"
                alt="PESO Seal"
                class="me-2"
                style="width: 40px; height: 40px; object-fit: contain"
              />
              <span
                class="logo-text font-weight-bold h3 mb-0"
                style="margin-left: 15px"
                >PESO</span
              >
            </div>
            <nav class="mt-3">
              <ul>
                <li class="nav-item">
                  <a href="/pages/dashboard/dashboard.html"
                    ><i class="fas fa-home"></i
                    ><span class="nav-link-text"> Dashboard</span></a
                  >
                </li>
                <li class="nav-item">
                  <a href="/pages/announcements/announcements.html"
                    ><i class="fas fa-bullhorn"></i
                    ><span class="nav-link-text"> Announcements</span></a
                  >
                </li>
                <li class="nav-item">
                  <a href="/pages/programs/programs.html"
                    ><i class="fas fa-clipboard-list"></i
                    ><span class="nav-link-text"> Programs</span></a
                  >
                </li>
                <li class="nav-item has-submenu">
                  <a href="#"
                    ><i class="fas fa-graduation-cap"></i
                    ><span class="nav-link-text"> Scholarship</span
                    ><i class="fas fa-chevron-right submenu-arrow"></i
                  ></a>
                  <ul class="nav-submenu">
                    <li>
                      <a
                        href="/pages/scholarship_programs/scholarship_programs.html"
                        ><i class="fas fa-book-open"></i> Scholarship
                        Programs</a
                      >
                    </li>
                    <li>
                      <a
                        href="/pages/scholarship_applied/scholarship_applied.html"
                        ><i class="fas fa-user-graduate"></i> Scholarship
                        Applicants</a
                      >
                    </li>
                  </ul>
                </li>
                <li class="nav-item">
                  <a href="/pages/job_applicants/job_applicants.html"
                    ><i class="fas fa-briefcase"></i
                    ><span class="nav-link-text"> Applicants</span></a
                  >
                </li>
                <li class="nav-item">
                  <a
                    href="/pages/staff_accounts/staff_accounts.html"
                    class="active"
                    ><i class="fas fa-user-shield"></i
                    ><span class="nav-link-text"> Staff Accounts</span></a
                  >
                </li>
              </ul>
            </nav>
            <a href="/pages/login/login.html" class="exit-link text-danger"
              ><i class="fas fa-sign-out-alt"></i><span> Exit</span></a
            >
          </div>
          <button
            type="button"
            class="sidebar-toggle"
            aria-label="Collapse sidebar"
          >
            <i class="fas fa-chevron-left"></i>
          </button>
        </div>
        <div class="main-content px-4">
          <div class="row top-bar mb-4">
            <div class="col-md-6 d-flex align-items-center">
              <button
                type="button"
                class="burger-btn me-3"
                aria-label="Open menu"
              >
                <i class="fas fa-bars"></i>
              </button>
            </div>
            <div class="col-md-6 text-end">
              <button
                type="button"
                class="theme-toggle-btn"
                aria-label="Toggle theme"
              >
                <i class="fas fa-moon"></i>
              </button>
              <i class="fas fa-bell me-3 text-secondary"></i>
              <i class="fas fa-user-circle fa-lg text-secondary"></i>
            </div>
          </div>
          <div class="container" style="max-width: 100%; padding: 0">
            <div class="page-header">
              <h1>Staff Accounts</h1>
              <p>Approve staff members so they can access the dashboard.</p>
            </div>
            <div id="errorContainer"></div>
            <div class="toolbar">
              <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input
                  type="text"
                  id="searchBox"
                  class="search-input"
                  placeholder="Search staff..."
                />
              </div>
              <button class="btn btn-primary" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> Refresh
              </button>
            </div>
            <div class="table-container">
              <div class="table-scroll-wrapper">
                <table id="staffTable">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Email</th>
                      <th>Joined</th>
                      <th>Status</th>
                      <th style="text-align: center">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="staffTableBody">
                    <tr class="table-skeleton-row">
                      <td>
                        <div class="table-skeleton-user-info">
                          <div
                            class="table-skeleton-cell table-skeleton-avatar"
                          ></div>
                          <div
                            class="table-skeleton-cell table-skeleton-name"
                          ></div>
                        </div>
                      </td>
                      <td>
                        <div
                          class="table-skeleton-cell table-skeleton-email"
                        ></div>
                      </td>
                      <td>
                        <div
                          class="table-skeleton-cell table-skeleton-date"
                        ></div>
                      </td>
                      <td>
                        <div
                          class="table-skeleton-cell table-skeleton-badge"
                        ></div>
                      </td>
                      <td style="text-align: center">
                        <div
                          class="table-skeleton-cell table-skeleton-actions"
                        ></div>
                      </td>
                    </tr>
                    <tr class="table-skeleton-row">
                      <td>
                        <div class="table-skeleton-user-info">
                          <div
                            class="table-skeleton-cell table-skeleton-avatar"
                          ></div>
                          <div
                            class="table-skeleton-cell table-skeleton-name"
                          ></div>
                        </div>
                      </td>
                      <td>
                        <div
                          class="table-skeleton-cell table-skeleton-email"
                        ></div>
                      </td>
                      <td>
                        <div
                          class="table-skeleton-cell table-skeleton-date"
                        ></div>
                      </td>
                      <td>
                        <div
                          class="table-skeleton-cell table-skeleton-badge"
                        ></div>
                      </td>
                      <td style="text-align: center">
                        <div
                          class="table-skeleton-cell table-skeleton-actions"
                        ></div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div class="table-footer">
                Showing <span id="filteredCount">0</span> of
                <span id="totalCount">0</span> staff
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/js/utils/theme.js"></script>
    <script type="module" src="/js/utils/sidebar-role-visibility.js"></script>
    <script src="/js/utils/sidebar.js"></script>
    <script type="module" src="/js/authentication/logout.js"></script>
    <script type="module" src="/js/utils/topbar-notifications.js"></script>
    <script type="module" src="/js/staff_accounts/staff_accounts.js"></script>
  </body>
</html>
