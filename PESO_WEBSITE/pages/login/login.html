<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | EASE</title>
    <link rel="icon" type="image/png" href="/src/images/peso_seal.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="login-wrapper">
      <video
        class="login-bg-video"
        autoplay
        loop
        muted
        playsinline
        aria-hidden="true"
      >
        <source src="/src/images/VLOOP 720P.mp4" type="video/mp4" />
      </video>
      <!-- Floating card: left = info panel with 3 logos, right = login form -->
      <div class="login-float">
        <div class="login-float-left">
          <div class="login-float-left-patterns" aria-hidden="true"></div>
          <div class="login-float-left-content">
            <div class="login-three-logos">
              <img
                src="/src/images/oro.png"
                alt="Oro Seal"
                class="login-seal-circle"
              />
              <img
                src="/src/images/bago-pilipinas.png"
                alt="Bago Pilipinas Seal"
                class="login-seal-circle"
              />
              <img
                src="/src/images/peso_seal.png"
                alt="PESO Seal"
                class="login-seal-circle"
              />
            </div>
            <div class="login-main-logo-wrap">
              <img
                src="/src/images/ease-logo.png"
                alt="EASE"
                class="login-float-logo"
              />
            </div>
            <h1 class="login-float-title">EASE</h1>
            <span class="login-float-separator"></span>
            <p class="login-float-tagline">
              Easy Access to Scholarship and Employment
            </p>
          </div>
        </div>
        <div class="login-float-right">
          <div class="login-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to the admin dashboard</p>

            <form id="loginForm">
              <div class="form-group">
                <label>EMAIL ADDRESS</label>
                <div class="input-with-icon">
                  <span class="input-icon" aria-hidden="true">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                      />
                      <polyline points="22,6 12,13 2,6" />
                    </svg>
                  </span>
                  <input
                    type="email"
                    id="email"
                    placeholder="you@agency.gov.ph"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label>PASSWORD</label>
                <div class="input-with-icon password-input-wrapper">
                  <span class="input-icon" aria-hidden="true">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                  </span>
                  <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    id="passwordToggle"
                    aria-label="Toggle password visibility"
                    title="Show password"
                  >
                    <svg
                      class="icon-eye"
                      xmlns="http://www.w3.org/2000/svg"
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg
                      class="icon-eye-off"
                      xmlns="http://www.w3.org/2000/svg"
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      style="display: none"
                    >
                      <path
                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                      />
                      <line x1="1" y1="1" x2="23" y2="23" />
                    </svg>
                  </button>
                </div>
              </div>

              <div class="form-options">
                <label class="checkbox-label">
                  <input type="checkbox" />
                  <span>REMEMBER ME</span>
                </label>
                <a href="#">Forgot password?</a>
              </div>

              <button type="submit" class="btn-login">Sign In</button>
              <p class="signup-prompt">
                Don't have an account?
                <a href="/pages/signup/signup.html">Sign up</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/js/authentication/auth-guard.js"></script>
    <script type="module" src="/js/authentication/login.js"></script>
  </body>
</html>
